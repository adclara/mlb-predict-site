# AA Sports — deploy de producción (Worker + Pages) desde Actions, con el
# token de Cloudflare. Adrian ya no necesita correr wrangler en su Mac:
# poke a .github/poke-deploy y esto publica lo último de main.
name: deploy
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['.github/poke-deploy']
permissions:
  contents: read
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy Worker (API)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
        run: npx --yes wrangler@4 deploy
      - name: Deploy Pages (app)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
        run: npx --yes wrangler@4 pages deploy pages --project-name=aa-sports --branch=main --commit-dirty=true
      - name: Verificar producción
        run: |
          sleep 20
          BODY=$(curl -s https://aasport.net/)
          echo "$BODY" | grep -q 'id="authbox"' && echo "OK login presente" || { echo "FALTA authbox"; exit 1; }
          echo "$BODY" | grep -q 'recentnote' && echo "OK version nueva (recent/standings)" || { echo "FALTA recentnote"; exit 1; }
          curl -s https://aa-sports-api.opsmira9.workers.dev/v1/me -H "origin: https://aasport.net" -o /dev/null -D - | grep -i "access-control-allow-origin: https://aasport.net" && echo "OK worker acepta aasport.net"
