# AA Sports — deploy de producción (Worker + Pages) desde Actions, con el
# token de Cloudflare. Adrian ya no necesita correr wrangler en su Mac:
# poke a .github/poke-deploy y esto publica lo último de main.
name: deploy
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['.github/poke-deploy']
permissions:
  contents: read
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Producción = main (fix de production branch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CUR=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports \
            | tr ',' '\n' | grep -m1 '"production_branch"' || true)
          echo "actual: $CUR"
          echo "$CUR" | grep -q '"main"' && echo "ya es main" || {
            curl -s -X PATCH -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "content-type: application/json" \
              -d '{"production_branch":"main"}' \
              https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports \
              | head -c 300; echo; echo "production branch → main"; }
      - name: Deploy Worker (API)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
        run: npx --yes wrangler@4 deploy
      - name: Verificar cron del vigía (Radar cada 5 min)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          SCHED=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/workers/scripts/aa-sports-api/schedules)
          echo "schedules: $(echo "$SCHED" | head -c 300)"
          if echo "$SCHED" | grep -q '"success":true'; then
            echo "$SCHED" | grep -qF '*/5 * * * *' \
              && echo "✅ Radar en vivo: cron */5 * * * * REGISTRADO — el vigía corre cada 5 min" \
              || { echo "❌ FALTA el cron */5 — el Radar NO se actualizaría cada 5 min"; exit 1; }
          else
            echo "⚠️ no se pudo leer schedules (API/token); no fallo el deploy por esto"
          fi
      - name: Telegram del vigía (secretos al Worker + mensaje de prueba)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN || secrets.CHAT_BOT }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ]; then
            echo "Telegram sin configurar (falta el secreto TG_BOT_TOKEN) — salto."
            exit 0
          fi
          # chat id: usa el secreto si existe; si no, lo descubre solo con getUpdates
          CHAT="$TG_CHAT_ID"
          if [ -z "$CHAT" ]; then
            CHAT=$(curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates" \
              | tr '{' '\n' | grep -m1 '"chat":' -A0 || true)
            CHAT=$(curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates" \
              | grep -o '"chat":{"id":[-0-9]*' | grep -o '[-0-9]*$' | sort -u | head -1)
          fi
          if [ -z "$CHAT" ]; then
            echo "⚠️ El bot aún no tiene mensajes: envíale cualquier texto a t.me/POLYSIBOT y re-dispara el deploy."
            exit 0
          fi
          printf '%s' "$TG_BOT_TOKEN" | npx --yes wrangler@4 secret put TG_BOT_TOKEN
          printf '%s' "$CHAT" | npx --yes wrangler@4 secret put TG_CHAT_ID
          echo "✅ Secretos de Telegram cargados al Worker (chat …${CHAT: -4})."
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H 'content-type: application/json' \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":\"✅ Radar AA conectado — recibirás aquí las alertas de las wallets vigiladas (🎯 posibles informados). Descriptivo, no recomendación.\"}" \
            | grep -o '"ok":[a-z]*' || true
      - name: Deploy Pages (app)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
        run: npx --yes wrangler@4 pages deploy pages --project-name=aa-sports --branch=main --commit-dirty=true
      - name: Verificar y diagnosticar producción
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          sleep 25
          for u in https://aasport.net/ https://www.aasport.net/ https://aa-sports-5ap.pages.dev/ https://main.aa-sports-5ap.pages.dev/; do
            echo "== $u"
            curl -s -D /tmp/h "$u" -o /tmp/b || { echo "  (no responde)"; continue; }
            grep -iE "^(cf-cache-status|etag|last-modified|age|location):" /tmp/h || true
            for m in authbox recentnote lotBoot dPick; do grep -q "$m" /tmp/b && echo "  marker $m: SI" || echo "  marker $m: no"; done
          done
          echo "== estado de dominios en Pages =="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports/domains | head -c 2000; echo
          echo "== últimos deployments =="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports/deployments?per_page=3" \
            | tr ',' '\n' | grep -E '"id"|"environment"|"created_on"|"url"' | head -24
          BODY=$(curl -s https://aasport.net/)
          echo "$BODY" | grep -q 'id="authbox"' && echo "✅ aasport.net sirve la versión nueva" || echo "⚠️ aasport.net aún sirve versión vieja (ver diagnóstico)"
