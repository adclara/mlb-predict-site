# AA Sports — deploy de producción (Worker + Pages) desde Actions, con el
# token de Cloudflare. Adrian ya no necesita correr wrangler en su Mac:
# poke a .github/poke-deploy y esto publica lo último de main.
name: deploy
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['.github/poke-deploy']
permissions:
  contents: read
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regresión de lógica — MLB causal, ingesta, mercados sombra y Radar/Telegram
        run: node --test tests/mlb_live_date.test.mjs tests/mlb_lock_gate.test.mjs tests/mlb_market_lab.test.mjs tests/mlb_ledger_migration.test.mjs tests/mlb_ledger_integrity.test.mjs tests/mlb_model_integrity.test.mjs tests/mlb_ingest_consumer.test.mjs tests/mlb_normalize_observed.test.mjs tests/mlb_content_hash.test.mjs tests/mlb_upload_guard.test.mjs tests/worker_mlb_ingest.test.mjs tests/poly_telegram_gate.test.mjs
      - name: Producción = main (fix de production branch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          URL=https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports
          BODY=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$URL")
          CUR=$(BODY="$BODY" node -e 'const j=JSON.parse(process.env.BODY); if(j.success!==true) process.exit(1); process.stdout.write(String(j.result?.production_branch||""))')
          echo "rama de producción actual: $CUR"
          if [ "$CUR" != main ]; then
            PATCH=$(curl -fsS -X PATCH -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "content-type: application/json" -d '{"production_branch":"main"}' "$URL")
            PATCH="$PATCH" node -e 'const j=JSON.parse(process.env.PATCH); if(j.success!==true || j.result?.production_branch!=="main") process.exit(1)'
          fi
          VERIFY=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$URL")
          VERIFY="$VERIFY" node -e 'const j=JSON.parse(process.env.VERIFY); if(j.success!==true || j.result?.production_branch!=="main") process.exit(1)'
          echo "✅ rama de producción verificada: main"
      - name: Deploy Worker (API)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
        run: |
          npx --yes wrangler@4.112.0 d1 migrations apply aa-sports --remote
          npx --yes wrangler@4.112.0 deploy
      - name: Verificar crons del vigía y la ingesta MLB
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          SCHED=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/workers/scripts/aa-sports-api/schedules)
          echo "schedules: $(echo "$SCHED" | head -c 300)"
          if echo "$SCHED" | grep -q '"success":true'; then
            echo "$SCHED" | grep -qF '*/5 * * * *' \
              && echo "✅ Radar en vivo: cron */5 * * * * REGISTRADO — el vigía corre cada 5 min" \
              || { echo "❌ FALTA el cron */5 — el Radar NO se actualizaría cada 5 min"; exit 1; }
            echo "$SCHED" | grep -qF '*/20 * * * *' \
              && echo "✅ MLB: captura pública */20 * * * * REGISTRADA" \
              || { echo "❌ FALTA el cron */20 — la ingesta MLB no estaría activa"; exit 1; }
            echo "$SCHED" | grep -qF '0 13 * * *' \
              && echo "✅ Radar: archivo diario 0 13 * * * REGISTRADO" \
              || { echo "❌ FALTA el cron diario 0 13 — el archivo del Radar no correría"; exit 1; }
          else
            echo "❌ no se pudo leer schedules (API/token); no puedo probar que los crons quedaron activos"
            exit 1
          fi
      - name: Telegram del vigía (solo cargar secretos; sin mensaje de prueba)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN || secrets.CHAT_BOT }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ]; then
            echo "Telegram sin configurar (falta el secreto TG_BOT_TOKEN) — salto."
            exit 0
          fi
          # chat id: usa el secreto si existe; si no, lo descubre solo con getUpdates
          CHAT="$TG_CHAT_ID"
          if [ -z "$CHAT" ]; then
            CHAT=$(curl -s "https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates" \
              | grep -o '"chat":{"id":[-0-9]*' | grep -o '[-0-9]*$' | sort -u | head -1 || true)
          fi
          if [ -z "$CHAT" ]; then
            echo "⚠️ El bot aún no tiene mensajes: envíale cualquier texto a t.me/POLYSIBOT y re-dispara el deploy."
            exit 0
          fi
          printf '%s' "$TG_BOT_TOKEN" | npx --yes wrangler@4.112.0 secret put TG_BOT_TOKEN
          printf '%s' "$CHAT" | npx --yes wrangler@4.112.0 secret put TG_CHAT_ID
          echo "✅ Secretos de Telegram cargados al Worker (chat …${CHAT: -4})."
          echo "Sin mensaje de prueba: el canal solo recibe el gate excepcional rare_v1 (máx. 2/día; puede ser 0)."
      - name: Deploy Pages (app)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f02574feb7272a1da2818e35e0ff4342
        run: npx --yes wrangler@4.112.0 pages deploy pages --project-name=aa-sports --branch=main --commit-dirty=true
      - name: Verificar y diagnosticar producción
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          sleep 25
          for u in https://aasport.net/ https://www.aasport.net/ https://aa-sports-5ap.pages.dev/ https://main.aa-sports-5ap.pages.dev/; do
            echo "== $u"
            curl -s -D /tmp/h "$u" -o /tmp/b || { echo "  (no responde)"; continue; }
            grep -iE "^(cf-cache-status|etag|last-modified|age|location):" /tmp/h || true
            for m in authbox recentnote lotBoot dPick; do grep -q "$m" /tmp/b && echo "  marker $m: SI" || echo "  marker $m: no"; done
          done
          echo "== estado de dominios en Pages =="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports/domains | head -c 2000; echo
          echo "== últimos deployments =="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/f02574feb7272a1da2818e35e0ff4342/pages/projects/aa-sports/deployments?per_page=3" \
            | tr ',' '\n' | grep -E '"id"|"environment"|"created_on"|"url"' | head -24
          BODY=$(curl -s https://aasport.net/)
          echo "$BODY" | grep -q 'id="authbox"' && echo "✅ aasport.net sirve la versión nueva" || echo "⚠️ aasport.net aún sirve versión vieja (ver diagnóstico)"
          echo "$BODY" | grep -q 'AA_MLB_LIVE_DATE_GUARD_V2' \
            && echo "✅ Pages contiene el candado MLB de fecha exacta" \
            || { echo "❌ Pages no contiene el candado MLB nuevo"; exit 1; }
          CSP=$(curl -sI https://aasport.net/ | tr -d '\r' | grep -i '^content-security-policy:' || true)
          echo "$CSP"
          echo "$CSP" | grep -q 'https://static.cloudflareinsights.com' \
            && echo "✅ CSP permite el script oficial de Cloudflare Web Analytics" \
            || { echo "❌ CSP bloquea el script de Cloudflare Web Analytics"; exit 1; }
          echo "$CSP" | grep -q 'https://cloudflareinsights.com' \
            && echo "✅ CSP permite el envío oficial de Web Analytics" \
            || { echo "❌ CSP bloquea el envío de Cloudflare Web Analytics"; exit 1; }
      - name: Diagnóstico semántico de producción
        run: |
          node robot/prod_diag.mjs
          healthy=0
          for i in $(seq 1 80); do
            BODY=$(curl -fsS https://aa-sports-api.opsmira9.workers.dev/v1/mlb/pipeline-health || true)
            echo "pipeline intento $i/80: $BODY"
            if BODY="$BODY" node -e 'const j=JSON.parse(process.env.BODY); process.exit(j.pipeline==="mlb_ingest_20m" && j.ok===true && j.fresh===true ? 0 : 1)'; then
              healthy=1
              break
            fi
            sleep 30
          done
          if [ "$healthy" -ne 1 ]; then
            echo "❌ la ingesta MLB no produjo un slot completo y fresco dentro de 40 minutos"
            exit 1
          fi
          echo "✅ ingesta MLB completa y fresca"
      - name: Gate de datos de producción
        run: node robot/qa_check.mjs
