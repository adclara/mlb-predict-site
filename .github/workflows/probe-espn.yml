name: probe-espn

# Sonda de diagnóstico: imprime en el log la forma real de las respuestas
# de ESPN que el sandbox no puede consultar. Solo lectura, sin secrets.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/poke-probe']

concurrency:
  group: probe-espn
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Soccer summary (alineaciones + stats + eventos)
        run: |
          UA='user-agent: aa-sports/1.0'
          # tomar un evento reciente del Mundial (o de una liga con partidos)
          for LG in fifa.world eng.1 esp.1 usa.1; do
            curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/$LG/scoreboard?dates=$(date -u -d '2 days ago' +%Y%m%d)-$(date -u +%Y%m%d)" -H "$UA" -o /tmp/sb.json
            EID=$(jq -r '[.events[] | select((.competitions[0].status.type.state // "") != "pre")][0].id // empty' /tmp/sb.json)
            [ -n "$EID" ] && { echo "liga $LG evento $EID"; break; }
          done
          [ -z "$EID" ] && EID=$(jq -r '.events[0].id // empty' /tmp/sb.json)
          echo "== summary evento $EID (liga $LG) =="
          curl -s "https://site.api.espn.com/apis/site/v2/sports/soccer/$LG/summary?event=$EID" -H "$UA" -o /tmp/sum.json
          echo '-- top-level keys --'; jq 'keys' /tmp/sum.json
          echo '-- rosters[0] (alineación): keys + formation + 1er titular --'
          jq '.rosters[0] | {team: .team.abbreviation, formation, homeAway, keys: keys}' /tmp/sum.json | head -c 1500
          jq '.rosters[0].roster[0]' /tmp/sum.json | head -c 1500
          echo
          echo '-- boxscore.teams[0].statistics (stats del equipo) --'
          jq '.boxscore.teams[0] | {team: .team.abbreviation, stats: (.statistics // [] | map({name, displayValue}))}' /tmp/sum.json | head -c 2500
          echo
          echo '-- keyEvents[0] (goles/tarjetas) --'
          jq '.keyEvents[0] // .commentary[0] // "sin keyEvents"' /tmp/sum.json | head -c 1200
          echo
          echo '-- headToHeadGames? --'
          jq 'has("headToHeadGames")' /tmp/sum.json

      - name: NBA summary (box score por jugador + team stats)
        run: |
          UA='user-agent: aa-sports/1.0'
          curl -s 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=20260601-20260625' -H "$UA" -o /tmp/nsb.json
          EID=$(jq -r '.events[0].id // empty' /tmp/nsb.json)
          echo "== summary NBA evento $EID =="
          curl -s "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=$EID" -H "$UA" -o /tmp/nsum.json
          echo '-- top-level keys --'; jq 'keys' /tmp/nsum.json
          echo '-- boxscore.players[0]: team + labels + 1er jugador (stats) --'
          jq '.boxscore.players[0] | {team: .team.abbreviation, stat_labels: (.statistics[0].labels // .statistics[0].names), athlete0: (.statistics[0].athletes[0] | {name: .athlete.displayName, stats})}' /tmp/nsum.json | head -c 2500
          echo
          echo '-- boxscore.teams[0].statistics (team stats) --'
          jq '.boxscore.teams[0].statistics // [] | map({label, displayValue}) | .[0:8]' /tmp/nsum.json | head -c 1500
          echo

      - name: Tenis summary (estadísticas del partido)
        run: |
          UA='user-agent: aa-sports/1.0'
          for T in atp wta; do
            curl -s "https://site.api.espn.com/apis/site/v2/sports/tennis/$T/scoreboard" -H "$UA" -o /tmp/tsb.json
            EID=$(jq -r '[.events[].competitions[]?, .events[].groupings[]?.competitions[]?] | .[0].id // empty' /tmp/tsb.json)
            [ -n "$EID" ] && { echo "tour $T evento $EID"; break; }
          done
          echo "== summary tenis evento $EID (tour $T) =="
          curl -s "https://site.api.espn.com/apis/site/v2/sports/tennis/$T/summary?event=$EID" -H "$UA" -o /tmp/tsum.json
          echo '-- top-level keys --'; jq 'keys' /tmp/tsum.json
          echo '-- boxscore / statistics --'
          jq '(.boxscore // .statistics // "sin boxscore") | if type=="object" then keys else . end' /tmp/tsum.json | head -c 800
          jq '.boxscore.players // .statistics // [] | .[0]' /tmp/tsum.json | head -c 2000
          echo
