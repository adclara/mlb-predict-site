# Runs EVERY HOUR (a living model). daily.mjs is safe at any hour: it uses the
# EASTERN date, posts the day's plays + fijos only after 8am ET (earlier runs
# grade finals and capture the earliest opening lines), freezes posted picks,
# refreshes multi-book odds/consensus/line movement, and rebuilds the learning
# snapshot. After it, live_odds.mjs watches IN-PROGRESS games for up to ~45 min,
# snapshotting the live books ("logros") every ~5 min and pushing every ~10 min
# so GitHub Pages serves near-live market data during games.
# Public repo -> free unlimited Actions minutes; same-repo commit -> the default
# GITHUB_TOKEN suffices (no secret). The concurrency group serializes runs (a
# queued hourly run simply starts when the watcher of the previous one ends).
name: adrian-daily
on:
  schedule:
    - cron: '7 * * * *' # hourly (offset :07 to dodge the top-of-hour Actions rush)
  workflow_dispatch: {}
  # Manual "poke": committing any change to .github/poke to main fires a run
  # immediately (the GitHub App token can't call workflow_dispatch, and a brand
  # new cron can take a while to register — this is the no-permissions lever).
  push:
    branches: [main]
    paths: ['.github/poke']
permissions:
  contents: write
concurrency:
  group: adrian-daily
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Git identity (robot)
        run: |
          git config user.name "adrian-robot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Compute + grade + learn
        run: DATA_DIR="$PWD/data" node robot/daily.mjs
      - name: Commit picks/history
        run: |
          git add data/history data/elo.json data/elo_state.json 2>/dev/null || git add data/history
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Adrian robot: picks + grading ($(date -u +%FT%TZ))"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push && break || sleep 5
            done
          fi
      # AA Sports: publica los resultados del día a Cloudflare (KV + D1) vía API
      # REST. Si el secret no existe todavía, se salta sin romper la corrida.
      - name: Publicar a Cloudflare (AA Sports)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN no configurado; salto la publicación."
          else
            node cloudflare/upload.mjs
          fi
      # Bajas: lesionados/suspendidos por equipo (MLB StatsAPI + NBA ESPN) → KV.
      - name: Bajas (lesionados y suspendidos)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: node robot/injuries.mjs || echo "bajas: falló sin romper la corrida"
      - name: Live odds watcher (logros en vivo)
        run: DATA_DIR="$PWD/data" node robot/live_odds.mjs
      - name: Commit any remaining live data
        if: always()
        run: |
          git add data/history
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "live odds: final flush ($(date -u +%FT%TZ))"
            for i in 1 2 3; do
              git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push && break || sleep 5
            done
          fi
      # Segunda publicación: tras el watcher, para que las curvas WP y los
      # marcadores recién calificados lleguen frescos a AA Sports.
      - name: Re-publicar a Cloudflare (post-watcher)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN no configurado; salto la publicación."
          else
            node cloudflare/upload.mjs
          fi
