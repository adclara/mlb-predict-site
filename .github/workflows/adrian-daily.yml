# Corrida horaria corta: materializa el slate privado, gradúa finales y publica
# solo cuando cambia el documento. En el mismo run congela AA Lab en SOMBRA;
# no publica su salida. La ingesta pública de 20 minutos vive en el Worker/D1
# y el refit AA diario en mlb-learning-daily.yml. Separar estas tres cadencias
# evita la cola de ~45 minutos del antiguo watcher y reduce escrituras.
name: adrian-daily
on:
  schedule:
    - cron: '7 * * * *' # hourly (offset :07 to dodge the top-of-hour Actions rush)
    # Redundant 7–8am ET watchdog. Both UTC hours cover DST; a public-API
    # preflight below skips every attempt once today's AA predictions exist.
    - cron: '12,27,42,57 11,12 * * *'
  workflow_dispatch: {}
  # Manual "poke": committing any change to .github/poke to main fires a run
  # immediately (the GitHub App token can't call workflow_dispatch, and a brand
  # new cron can take a while to register — this is the no-permissions lever).
  push:
    branches: [main]
    paths: ['.github/poke']
permissions:
  contents: write
concurrency:
  group: adrian-daily
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Watchdog de publicación 7am ET
        id: publish_gate
        env:
          AA_GITHUB_EVENT_NAME: ${{ github.event_name }}
          AA_GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: node robot/mlb_publish_watchdog.mjs
      - name: Verificar secreto de publicación
        if: steps.publish_gate.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: test -n "$CLOUDFLARE_API_TOKEN" || { echo "Falta CLOUDFLARE_API_TOKEN"; exit 1; }
      - name: Git identity (robot)
        if: steps.publish_gate.outputs.run == 'true'
        run: |
          git config user.name "adrian-robot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Consumir snapshots públicos D1 (best-effort)
        if: steps.publish_gate.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          AA_INGEST_SNAPSHOT: /tmp/aa-mlb-ingest.json
        run: node robot/mlb_ingest_consumer.mjs
      - name: Compute + grade AA y AA Lab sombra (sin refit intradía)
        if: steps.publish_gate.outputs.run == 'true'
        env:
          AA_SKIP_LEARNING: '1'
          AA_INGEST_SNAPSHOT: /tmp/aa-mlb-ingest.json
        run: DATA_DIR="$PWD/data" node robot/daily.mjs
      - name: Commit picks/history
        if: steps.publish_gate.outputs.run == 'true'
        run: |
          git add data/history data/elo.json data/elo_state.json 2>/dev/null || git add data/history
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Adrian robot: picks + grading ($(date -u +%FT%TZ))"
            pushed=0
            for i in 1 2 3; do
              if git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push; then
                pushed=1
                break
              fi
              # Dos crons atrasados pueden arrancar casi juntos. Si el rebase
              # choca en el ledger generado, el otro run ya ganó y persistió
              # una versión equivalente/más nueva. Abandona solo ESTE commit
              # efímero, adopta origin/main y deja que el paso de upload publique
              # esos bytes; no conviertas una reparación exitosa en run rojo.
              if git status --porcelain | grep -q '^UU\|^AA'; then
                git rebase --abort || true
                git fetch origin "$GITHUB_REF_NAME"
                git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"
                echo "otro run ya persistió el ledger; se adopta origin/$GITHUB_REF_NAME"
                pushed=1
                break
              fi
              sleep 5
            done
            if [ "$pushed" -ne 1 ]; then
              echo "No se pudo persistir el ledger tras 3 intentos."
              exit 1
            fi
          fi
      # AA Sports: publica los resultados del día a Cloudflare (KV + D1) vía API
      # REST. El preflight evita un run verde que deje producción congelada.
      - name: Publicar a Cloudflare (AA Sports)
        if: steps.publish_gate.outputs.run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLAREAPITOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: node cloudflare/upload.mjs
