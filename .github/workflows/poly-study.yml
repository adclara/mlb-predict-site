# AA Sports — Piloto de MEDICIÓN de Polymarket (sin dinero, sin copiar).
# Paso 1: sonda-gate (poly_probe.mjs) — verifica endpoints públicos y shapes
# desde Actions antes de construir el estudio. Solo lectura, sin secretos.
# Se dispara a mano o tocando .github/poke-poly.
name: poly-study
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['.github/poke-poly']
permissions:
  contents: read
concurrency:
  group: poly-study
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sonda Polymarket (gate)
        shell: /bin/bash {0}
        run: node robot/poly_probe.mjs
      - name: Estudio de wallets + simulación de copiado (medición)
        shell: /bin/bash {0}
        run: node robot/poly_study.mjs
      - name: Guardar JSON del estudio (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poly-study
          path: data/fase2/polymarket/poly_study.json
          if-no-files-found: ignore
