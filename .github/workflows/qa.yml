name: qa
# QA de producción + sonda de tenis. Corre en Actions (con red), solo lectura,
# sin secretos. Compara el Worker de producción contra la fuente real y busca el
# endpoint de estadísticas de tenis. Se dispara a mano o tocando .github/poke-qa.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/poke-qa']
concurrency:
  group: qa
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regresión MLB — aislamiento de fechas live
        run: node --test tests/mlb_live_date.test.mjs
      - name: Diagnóstico de producción (aasport.net + API)
        shell: /bin/bash {0}
        run: node robot/prod_diag.mjs
      - name: QA de producción (Worker vs fuente real)
        shell: /bin/bash {0}
        run: node robot/qa_check.mjs
      - name: Sonda de tenis (endpoint de estadísticas de partido)
        shell: /bin/bash {0}
        run: node robot/tennis_probe.mjs
      - name: Gate API de tenis (SportDevs — requiere TENNIS_API_KEY)
        shell: /bin/bash {0}
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
        run: node robot/tennis_api_probe.mjs
