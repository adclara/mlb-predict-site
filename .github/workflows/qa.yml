name: qa
# QA de producción + sonda de tenis. Corre en Actions (con red), solo lectura,
# sin secretos. Compara el Worker de producción contra la fuente real y busca el
# endpoint de estadísticas de tenis. Se dispara a mano o tocando .github/poke-qa.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/poke-qa']
concurrency:
  group: qa
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: QA de producción (Worker vs fuente real)
        shell: /bin/bash {0}
        run: node robot/qa_check.mjs
      - name: Sonda de tenis (endpoint de estadísticas de partido)
        shell: /bin/bash {0}
        run: node robot/tennis_probe.mjs
      - name: Sonda Sackmann (CSV de stats de partido — gate)
        shell: /bin/bash {0}
        run: node robot/sackmann_probe.mjs
      - name: Diagnóstico de alcance a GitHub externo
        shell: /bin/bash {0}
        run: |
          echo "== raw del repo de la sesión (control positivo) =="
          curl -s -m 15 -o /dev/null -w "http=%{http_code}\n" "https://raw.githubusercontent.com/adclara/mlb-predict-site/main/README.md"
          echo "== api.github.com repo JeffSackmann/tennis_atp =="
          curl -s -m 15 -w "\nhttp=%{http_code}\n" "https://api.github.com/repos/JeffSackmann/tennis_atp" | head -c 400
          echo
          echo "== git ls-remote (protocolo git, proxied) =="
          git ls-remote --heads https://github.com/JeffSackmann/tennis_atp 2>&1 | head -5
          echo "exit=$?"
          echo "== git clone --depth 1 (prueba real) =="
          git clone --depth 1 https://github.com/JeffSackmann/tennis_atp /tmp/tatp 2>&1 | tail -5
          echo "exit=$?"
          ls -la /tmp/tatp/*.csv 2>/dev/null | tail -8 || echo "(sin CSV)"
